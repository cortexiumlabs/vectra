name: Reusable – Docker Linux

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      registry:
        required: true
        type: string
      image_name:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  docker-linux:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name }}

      - name: Build and push linux/amd64
        id: build_amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile.linux
          platforms: linux/amd64
          push: true
          build-args: APP_VERSION=${{ inputs.release_version }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ inputs.registry }}/${{ inputs.image_name }},push-by-digest=true,name-canonical=true,push=true

      - name: Build and push linux/arm64
        id: build_arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile.linux
          platforms: linux/arm64
          push: true
          build-args: APP_VERSION=${{ inputs.release_version }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ inputs.registry }}/${{ inputs.image_name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export linux digests
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build_amd64.outputs.digest }}" > /tmp/digests/linux-amd64
          echo "${{ steps.build_arm64.outputs.digest }}" > /tmp/digests/linux-arm64

      - name: Upload linux digests
        uses: actions/upload-artifact@v4
        with:
          name: digests-linux
          path: /tmp/digests/*
          if-no-files-found: error
