name: Reusable – Docker Linux

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      registry:
        required: true
        type: string
      image_name:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  docker-linux:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push linux/amd64
        run: |
          IMAGE=${{ inputs.registry }}/${{ inputs.image_name }}
          docker build \
            --platform linux/amd64 \
            --file .docker/Dockerfile.linux \
            --build-arg APP_VERSION="${{ inputs.release_version }}" \
            --tag ${IMAGE}:${{ inputs.release_version }}-linux-amd64 \
            .
          docker push ${IMAGE}:${{ inputs.release_version }}-linux-amd64
          mkdir -p /tmp/digests
          docker inspect --format='{{index .RepoDigests 0}}' ${IMAGE}:${{ inputs.release_version }}-linux-amd64 | awk -F@ '{print $2}' > /tmp/digests/linux-amd64

      - name: Build and push linux/arm64
        run: |
          IMAGE=${{ inputs.registry }}/${{ inputs.image_name }}
          docker build \
            --platform linux/arm64 \
            --file .docker/Dockerfile.linux \
            --build-arg APP_VERSION="${{ inputs.release_version }}" \
            --tag ${IMAGE}:${{ inputs.release_version }}-linux-arm64 \
            .
          docker push ${IMAGE}:${{ inputs.release_version }}-linux-arm64
          docker inspect --format='{{index .RepoDigests 0}}' ${IMAGE}:${{ inputs.release_version }}-linux-arm64 | awk -F@ '{print $2}' >> /tmp/digests/linux-arm64

      - name: Upload linux digests
        uses: actions/upload-artifact@v4
        with:
          name: digests-linux
          path: /tmp/digests/*
          if-no-files-found: error
