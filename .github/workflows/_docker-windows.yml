name: Reusable – Docker Windows

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      registry:
        required: true
        type: string
      image_name:
        required: true
        type: string

jobs:
  docker-windows:
    strategy:
      matrix:
        include:
          - os: windows-2022
            dockerfile: .docker/Dockerfile.windows-ltsc2022
            suffix: ltsc2022
          - os: windows-2025
            dockerfile: .docker/Dockerfile.windows-ltsc2025
            suffix: ltsc2025
    runs-on: ${{ matrix.os }}
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Windows image (${{ matrix.suffix }})
        shell: bash
        run: |
          IMAGE=${{ inputs.registry }}/${{ inputs.image_name }}
          docker build \
            --file ${{ matrix.dockerfile }} \
            --build-arg APP_VERSION="${{ inputs.release_version }}" \
            --tag ${IMAGE}:${{ inputs.release_version }}-windows-${{ matrix.suffix }} \
            .
          docker push ${IMAGE}:${{ inputs.release_version }}-windows-${{ matrix.suffix }}
          mkdir -p "${{ runner.temp }}/digests"
          docker inspect --format='{{index .RepoDigests 0}}' ${IMAGE}:${{ inputs.release_version }}-windows-${{ matrix.suffix }} | awk -F@ '{print $2}' > "${{ runner.temp }}/digests/windows-${{ matrix.suffix }}"

      - name: Upload Windows digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-windows-${{ matrix.suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
